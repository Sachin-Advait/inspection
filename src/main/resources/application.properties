# ---------------------------------------
# SERVER
# ---------------------------------------
spring.application.name=inspection_backend
server.port=${PORT:8070}
server.servlet.context-path=/inspection/api
# ---------------------------------------
# DATABASE (POSTGRESQL)
# ---------------------------------------
spring.datasource.url=jdbc:postgresql://ep-shy-mode-aiqfd5gb-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_J4LTKk9vXwBp
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
# ---------------------------------------
# JPA / HIBERNATE
# ---------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# ---------------------------------------
# FLYWAY MIGRATION
# ---------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# ---------------------------------------
# JACKSON
# ---------------------------------------
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
# ---------------------------------------
# FILE UPLOAD
# ---------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
# ---------------------------------------
# FLOWABLE WORKFLOW
# ---------------------------------------
flowable.database-schema-update=true
flowable.async-executor-activate=true
flowable.check-process-definitions=true
flowable.history-level=audit
# ---------------------------------------
# JWT SECURITY
# ---------------------------------------
app.security.jwt.secret=employeeCaseSecretKey1234567890ForMongoDBProject
app.security.jwt.expiration=86400000
# ---------------------------------------
# OUTBOX PROCESSOR
# ---------------------------------------
app.outbox.poll-interval-ms=5000
app.outbox.max-attempts=5
# ---------------------------------------
# ACTUATOR
# ---------------------------------------
management.endpoints.web.exposure.include=health,info
# ---------------------------------------
# LOGGING
# ---------------------------------------
logging.level.com.gissoft=INFO
logging.level.org.flowable=WARN
logging.level.org.hibernate.SQL=WARN